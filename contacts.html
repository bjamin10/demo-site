<header>
  <h1>Get in touch with us!</h1>
  <p>Fill out this short form and we will send you an email with details in 3-4 business days.</p>

<div class="container">

  <div class="section" id="contact">
  <h2>Contact</h2>
  <div class="card">
    <form action="submit_form.php" method="post" style="display: flex; flex-direction: column; gap: 10px;">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4" required style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;"></textarea>
